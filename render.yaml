services:
  - type: web
    name: mamad-mds
    runtime: node
    rootDir: vercel-site
    buildCommand: npm install --include=dev --no-optional && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
