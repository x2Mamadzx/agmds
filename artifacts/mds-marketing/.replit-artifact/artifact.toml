kind = "web"
previewPath = "/"
title = "MDS Marketing"
version = "1.0.0"
id = "artifacts/mds-marketing"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23210

[services.development]
run = "pnpm --filter @workspace/mds-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mds-marketing", "run", "build" ]
serve = "static"
publicDir = "artifacts/mds-marketing/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23210"
BASE_PATH = "/"
